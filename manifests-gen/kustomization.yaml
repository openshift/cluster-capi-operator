apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

namespace: openshift-cluster-api

resources:
  - kustomize-values.yaml

# Scope all provider webhooks to the openshift-cluster-api namespace.
# This prevents webhooks from intercepting requests in other namespaces,
# which would fail on unsupported platforms where the webhook server is not running.
replacements:
  - source:
      kind: ConfigMap
      name: kustomize-values
      fieldPath: data.namespace
    targets:
      - select:
          kind: ValidatingWebhookConfiguration
        fieldPaths:
          - webhooks.*.namespaceSelector.matchLabels.kubernetes\.io/metadata\.name
        options:
          create: true
      - select:
          kind: MutatingWebhookConfiguration
        fieldPaths:
          - webhooks.*.namespaceSelector.matchLabels.kubernetes\.io/metadata\.name
        options:
          create: true
  # In disconnected clusters using pinned image sets, images are already
  # present on nodes. IfNotPresent avoids unnecessary pulls that fail
  # when the registry is unreachable (OCPBUGS-85337).
  - source:
      kind: ConfigMap
      name: kustomize-values
      fieldPath: data.imagePullPolicy
    targets:
      - select:
          kind: Deployment
        fieldPaths:
          - spec.template.spec.containers.*.imagePullPolicy
        options:
          create: true
      - select:
          kind: StatefulSet
        fieldPaths:
          - spec.template.spec.containers.*.imagePullPolicy
        options:
          create: true
      - select:
          kind: DaemonSet
        fieldPaths:
          - spec.template.spec.containers.*.imagePullPolicy
        options:
          create: true
      - select:
          kind: ReplicaSet
        fieldPaths:
          - spec.template.spec.containers.*.imagePullPolicy
        options:
          create: true
      - select:
          kind: Job
        fieldPaths:
          - spec.template.spec.containers.*.imagePullPolicy
        options:
          create: true
      - select:
          kind: CronJob
        fieldPaths:
          - spec.jobTemplate.spec.template.spec.containers.*.imagePullPolicy
        options:
          create: true
      - select:
          kind: Pod
        fieldPaths:
          - spec.containers.*.imagePullPolicy
        options:
          create: true

patches:

# Retain Secrets internally for reference tracking, but don't emit them
- target:
    kind: Secret
  patch: |
    apiVersion: v1
    kind: Secret
    metadata:
      name: __ignored__
      annotations:
        # Marks this resource as local-only so kustomize excludes it from the final output.
        config.kubernetes.io/local-config: "true"

# Set OpenShift pod annotations on all Deployments' pod templates.
# - required-scc: pins the SCC (default restricted-v2, providers can override).
#   See: https://github.com/openshift/enhancements/blob/master/enhancements/authentication/custom-scc-preemption-prevention.md
# - workload management: enables workload partitioning scheduling.
#   See: https://github.com/openshift/enhancements/blob/master/enhancements/workload-partitioning/wide-availability-workload-partitioning.md
- target:
    kind: Deployment
  patch: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: __ignored__
    spec:
      template:
        metadata:
          annotations:
            openshift.io/required-scc: "restricted-v2"
            target.workload.openshift.io/management: '{"effect": "PreferredDuringScheduling"}'
