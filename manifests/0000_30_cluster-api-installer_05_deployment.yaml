---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: capi-operator
  namespace: openshift-cluster-api-operator
  annotations:
    config.openshift.io/inject-proxy: capi-operator
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
    exclude.release.openshift.io/internal-openshift-hosted: "true"
    release.openshift.io/feature-gate: "ClusterAPIMachineManagement"
  labels:
    k8s-app: capi-operator
spec:
  selector:
    matchLabels:
      k8s-app: capi-operator
  replicas: 1
  template:
    metadata:
      annotations:
        target.workload.openshift.io/management: '{"effect": "PreferredDuringScheduling"}'
        openshift.io/required-scc: restricted-v2
      labels:
        k8s-app: capi-operator
    spec:
      serviceAccountName: capi-operator
      containers:
      - name: capi-operator
        image: registry.ci.openshift.org/openshift:cluster-capi-operator
        command:
        - /capi-operator
        args:
        - --diagnostics-address=:8443
        env:
        - name: RELEASE_VERSION
          value: "0.0.1-snapshot"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        ports:
        - containerPort: 9440
          name: health
          protocol: TCP
        - containerPort: 8443
          name: diagnostics
          protocol: TCP
        resources:
          requests:
            cpu: 10m
            memory: 50Mi
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - name: metrics-cert
          mountPath: /tmp/k8s-metrics-server/serving-certs
          readOnly: true
        - name: provider-aws
          mountPath: /var/lib/provider-images/aws-cluster-api-controllers
          subPath: capi-operator-manifests
          readOnly: true
        - name: provider-azure
          mountPath: /var/lib/provider-images/azure-cluster-api-controllers
          subPath: capi-operator-manifests
          readOnly: true
        - name: provider-baremetal
          mountPath: /var/lib/provider-images/baremetal-cluster-api-controllers
          subPath: capi-operator-manifests
          readOnly: true
        - name: provider-cluster-capi-controllers
          mountPath: /var/lib/provider-images/cluster-capi-controllers
          subPath: capi-operator-manifests
          readOnly: true
        - name: provider-cluster-capi-operator
          mountPath: /var/lib/provider-images/cluster-capi-operator
          subPath: capi-operator-manifests
          readOnly: true
        - name: provider-gcp
          mountPath: /var/lib/provider-images/gcp-cluster-api-controllers
          subPath: capi-operator-manifests
          readOnly: true
        - name: provider-ibmcloud
          mountPath: /var/lib/provider-images/ibmcloud-cluster-api-controllers
          subPath: capi-operator-manifests
          readOnly: true
        - name: provider-openstack
          mountPath: /var/lib/provider-images/openstack-cluster-api-controllers
          subPath: capi-operator-manifests
          readOnly: true
        - name: provider-openstack-resource-controller
          mountPath: /var/lib/provider-images/openstack-resource-controller
          subPath: capi-operator-manifests
          readOnly: true
        - name: provider-vsphere
          mountPath: /var/lib/provider-images/vsphere-cluster-api-controllers
          subPath: capi-operator-manifests
          readOnly: true
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9440
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 9440
          initialDelaySeconds: 5
          periodSeconds: 10
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      priorityClassName: system-node-critical
      restartPolicy: Always
      tolerations:
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      volumes:
      - name: metrics-cert
        secret:
          defaultMode: 420
          secretName: capi-operator-metrics-tls
      - name: provider-aws
        image:
          reference: registry.ci.openshift.org/openshift:aws-cluster-api-controllers
          pullPolicy: IfNotPresent
      - name: provider-azure
        image:
          reference: registry.ci.openshift.org/openshift:azure-cluster-api-controllers
          pullPolicy: IfNotPresent
      - name: provider-baremetal
        image:
          reference: registry.ci.openshift.org/openshift:baremetal-cluster-api-controllers
          pullPolicy: IfNotPresent
      - name: provider-cluster-capi-controllers
        image:
          reference: registry.ci.openshift.org/openshift:cluster-capi-controllers
          pullPolicy: IfNotPresent
      - name: provider-cluster-capi-operator
        image:
          reference: registry.ci.openshift.org/openshift:cluster-capi-operator
          pullPolicy: IfNotPresent
      - name: provider-gcp
        image:
          reference: registry.ci.openshift.org/openshift:gcp-cluster-api-controllers
          pullPolicy: IfNotPresent
      - name: provider-ibmcloud
        image:
          reference: registry.ci.openshift.org/openshift:ibmcloud-cluster-api-controllers
          pullPolicy: IfNotPresent
      - name: provider-openstack
        image:
          reference: registry.ci.openshift.org/openshift:openstack-cluster-api-controllers
          pullPolicy: IfNotPresent
      - name: provider-openstack-resource-controller
        image:
          reference: registry.ci.openshift.org/openshift:openstack-resource-controller
          pullPolicy: IfNotPresent
      - name: provider-vsphere
        image:
          reference: registry.ci.openshift.org/openshift:vsphere-cluster-api-controllers
          pullPolicy: IfNotPresent
