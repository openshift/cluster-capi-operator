apiVersion: config.openshift.io/v1
kind: ClusterOperator
metadata:
  name: cluster-api
  annotations:
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
    exclude.release.openshift.io/internal-openshift-hosted: "true"
    release.openshift.io/feature-gate: "ClusterAPIMachineManagement"
spec: {}
status:
  versions:
  - name: operator
    version: "0.0.1-snapshot"
  relatedObjects:
  # must-gather already fetches all ClusterOperators and CRDs (but not instances of those CRDs)

  # Listing namespaces causes must-gather to collect most standard resources
  # from those namespaces.
  - group: ""
    name: openshift-cluster-api
    resource: namespaces
  - group: ""
    name: openshift-cluster-api-operator
    resource: namespaces
  - group: ""
    name: openshift-compatibility-requirements-operator
    resource: namespaces

  # CVO-managed admission policies
  # FIXME: We fetch all admission policies because we have too many to list
  # individually. This is probably something kube-apiserver should be doing.
  - group: admissionregistration.k8s.io
    resource: validatingadmissionpolicies
  - group: admissionregistration.k8s.io
    resource: validatingadmissionpolicybindings

  # Collect all CompatibilityRequirement objects
  - group: apiextensions.openshift.io
    resource: compatibilityrequirements

  # the installer controller dynamically adds entries for CAPI providers it installs