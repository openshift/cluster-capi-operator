apiVersion: v1
kind: Service
metadata:
  annotations:
    exclude.release.openshift.io/internal-openshift-hosted: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
    release.openshift.io/feature-gate: "ClusterAPIMachineManagement"
    service.beta.openshift.io/serving-cert-secret-name: machine-api-migration-metrics-tls
  name: machine-api-migration-metrics
  namespace: openshift-cluster-api
spec:
  ports:
  - name: machine-api-migration-metrics
    port: 8443
    targetPort: diagnostics
  selector:
    k8s-app: machine-api-migration
  type: ClusterIP
  clusterIP: None
  sessionAffinity: None
