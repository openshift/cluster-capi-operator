---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    exclude.release.openshift.io/internal-openshift-hosted: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
    release.openshift.io/feature-gate: "ClusterAPIMachineManagement"
    capability.openshift.io/name: ClusterAPI
  name: openshift-capi-operator
rules:
- apiGroups:
  - config.openshift.io
  resources:
  - infrastructures
  verbs:
  - get
- apiGroups:
  - config.openshift.io
  resources:
  - clusteroperators
  verbs:
  - get
  - list
  - watch
  - create
- apiGroups:
  - config.openshift.io
  resources:
  - clusteroperators
  resourceNames:
  - cluster-api
  verbs:
  - update
  - patch
- apiGroups:
  - config.openshift.io
  resources:
  - clusteroperators/status
  resourceNames:
  - cluster-api
  verbs:
  - update
  - patch
- apiGroups:
  - config.openshift.io
  resources:
  - clusterversions
  - featuregates
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - operator.openshift.io
  resources:
  - clusterapis
  verbs:
  - get
  - list
  - watch
---
