# This NetworkPolicy allows egress traffic required for the CAPI operator
# deployments in the openshift-cluster-api-operator namespace.
# The operator and installer need broad internet access for cluster management
# operations, cloud provider API calls, and communication with various services.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  annotations:
    exclude.release.openshift.io/internal-openshift-hosted: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
    release.openshift.io/feature-gate: "ClusterAPIMachineManagement"
    capability.openshift.io/name: ClusterAPI
  name: allow-egress-operators
  namespace: openshift-cluster-api-operator
spec:
  egress:
  # Allow all egress traffic - operator needs broad access
  - {} # Empty rule allows all egress
  podSelector:
    matchExpressions:
    - key: k8s-app
      operator: In
      values:
      - capi-operator
      - capi-installer
  policyTypes:
  - Egress
