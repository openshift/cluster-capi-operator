---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  annotations:
    exclude.release.openshift.io/internal-openshift-hosted: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
    release.openshift.io/feature-gate: "ClusterAPIMachineManagement"
    service.beta.openshift.io/inject-cabundle: "true"
  name: openshift-capi-controllers
webhooks:
  - admissionReviewVersions:
      - v1
      - v1beta1
    clientConfig:
      service:
        name: capi-controllers-webhook-service
        namespace: openshift-cluster-api
        path: /validate-cluster-x-k8s-io-v1beta2-cluster
        port: 9443
    failurePolicy: Fail
    name: validation.cluster.cluster.x-k8s.io
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: openshift-cluster-api
    rules:
      - apiGroups:
          - cluster.x-k8s.io
        apiVersions:
          - v1beta2
        operations:
          - CREATE
          - UPDATE
          - DELETE
        resources:
          - clusters
    sideEffects: None
