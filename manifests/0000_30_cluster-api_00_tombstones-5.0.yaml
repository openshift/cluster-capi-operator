# Tombstones for objects moved from CVO to operator-managed during 5.0.
# The capi-controllers Deployment is now deployed by the capi-operator
# via the manifests-gen pipeline at installOrder 30, ensuring CRDs are
# installed before the controllers start.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: capi-controllers
  namespace: openshift-cluster-api
  annotations:
    release.openshift.io/delete: "true"
    exclude.release.openshift.io/internal-openshift-hosted: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
    release.openshift.io/feature-gate: "ClusterAPIMachineManagement"
