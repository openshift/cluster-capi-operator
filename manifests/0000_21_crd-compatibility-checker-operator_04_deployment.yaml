---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: compatibility-requirements-operator
  namespace: openshift-compatibility-requirements-operator
  annotations:
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
    exclude.release.openshift.io/internal-openshift-hosted: "true"
    release.openshift.io/feature-gate: "CRDCompatibilityRequirementOperator"
    capability.openshift.io/name: CompatibilityRequirements
  labels:
    k8s-app: compatibility-requirements-operator
spec:
  selector:
    matchLabels:
      k8s-app: compatibility-requirements-operator
  replicas: 1
  template:
    metadata:
      annotations:
        target.workload.openshift.io/management: '{"effect": "PreferredDuringScheduling"}'
        openshift.io/required-scc: restricted-v3
      labels:
        k8s-app: compatibility-requirements-operator
    spec:
      serviceAccountName: compatibility-requirements-operator
      containers:
      - name: compatibility-requirements-operator
        image: registry.ci.openshift.org/openshift:cluster-capi-operator
        command:
        - ./crd-compatibility-checker-operator
        args:
          - --diagnostics-address=:8443
        env:
        - name: RELEASE_VERSION
          value: "0.0.1-snapshot"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        readinessProbe:
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
          initialDelaySeconds: 0
          httpGet:
            path: /readyz
            port: healthz
        livenessProbe:
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
          initialDelaySeconds: 0
          httpGet:
            path: /healthz
            port: healthz
        ports:
        - containerPort: 9440
          name: healthz
          protocol: TCP
        - containerPort: 8443
          name: diagnostics
          protocol: TCP
        resources:
          requests:
            cpu: 10m
            memory: 50Mi
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - name: metrics-cert
          mountPath: /tmp/k8s-metrics-server/serving-certs
          readOnly: true
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      priorityClassName: system-cluster-critical
      restartPolicy: Always
      tolerations:
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      volumes:
      - name: metrics-cert
        secret:
          defaultMode: 420
          secretName: compatibility-requirements-operator-metrics-tls
