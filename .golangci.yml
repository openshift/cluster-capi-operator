version: "2"
linters:
  default: none
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - contextcheck
    - copyloopvar
    - cyclop
    - dogsled
    - dupl
    - durationcheck
    - err113
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - forcetypeassert
    - funlen
    - gochecknoglobals
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - goheader
    - goprintffuncname
    - gosec
    - govet
    - importas
    - ineffassign
    - makezero
    - misspell
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - nlreturn
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - staticcheck
    - tagliatelle
    - unconvert
    - unparam
    - unused
    - usetesting
    - wastedassign
    - whitespace
    - wrapcheck
    - wsl_v5
  settings:
    cyclop:
      max-complexity: 20
    goheader:
      values:
        regexp:
          license-year: (202[1-9]|20[3-9][0-9])
      template: |-
        Copyright {{license-year}} Red Hat, Inc.

        Licensed under the Apache License, Version 2.0 (the "License");
        you may not use this file except in compliance with the License.
        You may obtain a copy of the License at

        	http://www.apache.org/licenses/LICENSE-2.0

        Unless required by applicable law or agreed to in writing, software
        distributed under the License is distributed on an "AS IS" BASIS,
        WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
        See the License for the specific language governing permissions and
        limitations under the License.
    importas:
      alias:
        - pkg: sigs.k8s.io/cluster-api/api/core/v1beta1
          alias: clusterv1beta1
        - pkg: sigs.k8s.io/cluster-api/api/core/v1beta2
          alias: clusterv1
        - pkg: sigs.k8s.io/cluster-api/util/deprecated/v1beta1/conditions
          alias: v1beta1conditions
        - pkg: sigs.k8s.io/cluster-api/util/deprecated/v1beta1/conditions/v1beta2
          alias: v1beta2conditions
        - pkg: sigs.k8s.io/cluster-api/util/conditions/deprecated/v1beta1
          alias: deprecatedv1beta1conditions
        - pkg: sigs.k8s.io/cluster-api-provider-aws/v2/api/v1beta2
          alias: awsv1
        - pkg: sigs.k8s.io/cluster-api-provider-ibmcloud/api/v1beta2
          alias: ibmpowervsv1
        - pkg: sigs.k8s.io/cluster-api-provider-openstack/api/v1beta1
          alias: openstackv1
        - pkg: github.com/openshift/api/machine/v1
          alias: mapiv1
        - pkg: github.com/openshift/api/machine/v1beta1
          alias: mapiv1beta1
        - pkg: github.com/openshift/api/machine/v1alpha1
          alias: mapiv1alpha1
        - pkg: sigs.k8s.io/controller-runtime/pkg/log
          alias: logf
        - pkg: github.com/openshift/api/apiextensions/v1alpha1
          alias: apiextensionsv1alpha1
        - pkg: github.com/openshift/client-go/apiextensions/applyconfigurations/apiextensions/v1alpha1
          alias: apiextensionsapplyconfig
      no-unaliased: true
    nlreturn:
      block-size: 2
    revive:
      confidence: 0
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - disableStutteringCheck
          severity: warning
          disabled: false
    staticcheck:
      checks:
        - all
        - -ST1000
        # SA1019: Using a deprecated function, variable, constant or field
        #
        # We need to consider deprecated fields in MAPO-CAPO conversions
        - -SA1019
      dot-import-whitelist:
        - github.com/onsi/ginkgo/v2
        - github.com/onsi/gomega
    wrapcheck:
      ignore-package-globs:
        # return values from operatorstatus are intended to be used without wrapping
        - github.com/openshift/cluster-capi-operator/pkg/operatorstatus
  exclusions:
    generated: lax
    rules:
      - linters:
          - dupl
          - err113
          - forcetypeassert
          - funlen
          - gochecknoglobals
          - goconst
          - gocyclo
          - gosec
          - wrapcheck
        path: _test\.go|pkg/test/*

      # Not all platforms are supported by this operator, those which aren't
      # supported will be caught by the default case in the switches.
      - path: (.+)\.go$
        text: 'missing cases in switch of type v1.PlatformType: (\.*)'
    paths:
      - ^third_party/
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - ^third_party/
      - third_party$
      - builtin$
      - examples$
